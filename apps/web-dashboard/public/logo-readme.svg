<svg viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer hex ring lines -->
  <line x1="38.5" y1="24"   x2="32"   y2="35.6" stroke="#1E40AF" stroke-width="1.2"/>
  <line x1="32"   y1="35.6" x2="16"   y2="35.6" stroke="#1E40AF" stroke-width="1.2"/>
  <line x1="16"   y1="35.6" x2="9.5"  y2="24"   stroke="#1E40AF" stroke-width="1.2"/>
  <line x1="9.5"  y1="24"   x2="16"   y2="12.4" stroke="#1E40AF" stroke-width="1.2"/>
  <line x1="16"   y1="12.4" x2="32"   y2="12.4" stroke="#1E40AF" stroke-width="1.2"/>
  <line x1="32"   y1="12.4" x2="38.5" y2="24"   stroke="#1E40AF" stroke-width="1.2"/>

  <!-- Spokes -->
  <line x1="24" y1="24" x2="38.5" y2="24"   stroke="#2563EB" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="32"   y2="35.6" stroke="#2563EB" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="16"   y2="35.6" stroke="#2563EB" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="9.5"  y2="24"   stroke="#2563EB" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="16"   y2="12.4" stroke="#2563EB" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="32"   y2="12.4" stroke="#2563EB" stroke-width="1.2"/>

  <!-- Outer nodes -->
  <circle cx="38.5" cy="24"   r="2.5" fill="#2563EB"/>
  <circle cx="32"   cy="35.6" r="2.5" fill="#2563EB"/>
  <circle cx="16"   cy="35.6" r="2.5" fill="#2563EB"/>
  <circle cx="9.5"  cy="24"   r="2.5" fill="#2563EB"/>
  <circle cx="16"   cy="12.4" r="2.5" fill="#2563EB"/>
  <circle cx="32"   cy="12.4" r="2.5" fill="#2563EB"/>

  <!-- Center glow (radialGradient is safe on GitHub) -->
  <circle cx="24" cy="24" r="10" fill="url(#g)"/>

  <!-- Center node rings (simulate glow without filter) -->
  <circle cx="24" cy="24" r="5.5" fill="#1D4ED8" fill-opacity="0.35"/>
  <circle cx="24" cy="24" r="3.5" fill="#2563EB"/>
  <circle cx="24" cy="24" r="2"   fill="#60A5FA"/>

  <!-- Wordmark -->
  <text x="54" y="31"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="20" font-weight="700" letter-spacing="-0.5"
    fill="#111827">Nova</text>
  <text x="107" y="31"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="20" font-weight="700" letter-spacing="-0.5"
    fill="#2563EB">Grid</text>
</svg>
